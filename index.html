<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>로또 번호 생성기</h1>
            <button id="theme-toggle" aria-label="테마 변경">🌙</button>
        </div>
        <lotto-display></lotto-display>
    </div>

    <div id="contact">
        <h2>제휴문의</h2>
        <form id="contact-form" action="https://formspree.io/f/mqedvagw" method="POST">
            <input type="text" name="name" placeholder="이름 / 회사명" required>
            <input type="email" name="email" placeholder="이메일" required>
            <input type="tel" name="phone" placeholder="연락처">
            <select name="type" required>
                <option value="" disabled selected>문의 유형 선택</option>
                <option value="제휴">제휴 제안</option>
                <option value="광고">광고 문의</option>
                <option value="기타">기타</option>
            </select>
            <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
            <button type="submit">문의 보내기</button>
        </form>
        <p id="form-status"></p>
    </div>

    <div id="comments">
        <h2>댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            var disqus_config = function () {
                this.page.url = 'https://anesleedev.github.io/product-builder-lecture/';
                this.page.identifier = 'product-builder-lecture';
            };
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-rxvwii3mxu.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="main.js"></script>
</body>
</html>
